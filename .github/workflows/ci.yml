name: ci

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  lint-and-format:
    runs-on: ${{matrix.os}}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Executar ESLint
        run: npm run lint

      - name: Verificar formatação com Prettier
        run: npm run format

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Testes
        run: npm test
